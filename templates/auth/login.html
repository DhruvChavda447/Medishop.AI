{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — MediShop Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#06091a 0%,#0d1a3d 40%,#160e4a 70%,#06091a 100%);overflow:hidden">
<div class="auth-orb auth-orb1"></div>
<div class="auth-orb auth-orb2"></div>
<div class="auth-orb auth-orb3"></div>
<div class="auth-box">
  <div class="auth-logo">
    <div class="nb-ic"><i class="fa fa-heartbeat"></i></div>
    <span><span style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MediShop</span><span style="background:var(--grad-warm);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Pro</span></span>
  </div>
  <div class="auth-tabs">
    <a href="{% url 'login' %}" class="auth-tab active">Sign In</a>
    <a href="{% url 'signup' %}" class="auth-tab">Create Account</a>
  </div>
  {% if error %}
  <div class="auth-err" style="display:block">{{ error }}</div>
  {% endif %}
  <form method="post" novalidate>
    {% csrf_token %}
    <div class="auth-fg">
      <label class="auth-lbl"><i class="fa fa-envelope"></i> Email Address</label>
      <input type="email" name="email" class="auth-inp" placeholder="you@example.com" autocomplete="email" value="{{ form.email.value|default:'' }}" required>
    </div>
    <div class="auth-fg">
      <label class="auth-lbl"><i class="fa fa-lock"></i> Password</label>
      <div class="auth-pw-wrap">
        <input type="password" name="password" class="auth-inp" id="li_pw" placeholder="Your password" autocomplete="current-password" required>
        <button type="button" class="auth-pw-toggle" onclick="togglePw('li_pw',this)"><i class="fa fa-eye"></i></button>
      </div>
    </div>
    <button type="submit" class="auth-btn"><i class="fa fa-sign-in-alt"></i> Sign In to MediShop</button>
  </form>
  <div class="auth-div">or</div>
  <div style="text-align:center">
    <a href="{% url 'signup' %}" style="color:rgba(255,255,255,.5);font-size:.76rem">New user? Create a free account →</a>
  </div>
  <div class="auth-hint">🔒 Your health data is encrypted &amp; private<br>Powered by Django + PostgreSQL</div>
</div>
<script>
function togglePw(id,btn){const inp=document.getElementById(id);const show=inp.type==='password';inp.type=show?'text':'password';btn.innerHTML=show?'<i class="fa fa-eye-slash"></i>':'<i class="fa fa-eye"></i>';}
</script>
</body>
</html>
